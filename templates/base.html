<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Culinary Index{% endblock %}</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1410">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
  <style>
    /* Critical inline CSS - shows even before external CSS loads */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a1410; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #3a2e22;
      border-top-color: #e8734a; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { color: #a89880; margin-top: 1rem; font-family: Inter, system-ui, sans-serif; font-size: 0.95rem; }
    #loading-overlay .hint { color: #6a5e50; font-size: 0.8rem; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <!-- Loading overlay - removed once page loads -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading recipes...</p>
    <p class="hint">First visit may take up to 30s (server waking up)</p>
  </div>

  <noscript>
    <div style="background:#1a1410;color:#f0e8dc;padding:2rem;text-align:center;font-family:Inter,system-ui,sans-serif;">
      <h1 style="background:linear-gradient(135deg,#e8734a,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.8rem;">The Culinary Index</h1>
      <p>JavaScript is required for bookmarks and theme switching.</p>
      <p>The search still works without it.</p>
    </div>
  </noscript>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">The Culinary Index</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">&#9790;</button>
    </div>
  </header>

  <!-- Install App Banner (mobile only) -->
  <div class="install-banner" id="installBanner" style="display:none;">
    <div class="container">
      <span class="install-text">Get the app for a better experience</span>
      <a href="/download" class="install-btn">Install App</a>
      <button class="install-close" onclick="dismissInstall()">&times;</button>
    </div>
  </div>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Searches Food Fusion &middot; SuperChef &middot; Tasty &middot; Web</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}?v=3"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    window.addEventListener('load', function() {
      var overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('fade-out');
        setTimeout(function() { overlay.remove(); }, 500);
      }
    });
    // Safety: remove overlay after 60s even if load event hasn't fired
    setTimeout(function() {
      var overlay = document.getElementById('loading-overlay');
      if (overlay) { overlay.classList.add('fade-out'); setTimeout(function() { overlay.remove(); }, 500); }
    }, 60000);
  </script>
</body>
</html>
